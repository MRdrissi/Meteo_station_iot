spring.application.name=backend
# Configuration MQTT (HiveMQ Public pour le moment)
mqtt.broker.url=tcp://broker.hivemq.com:1883
mqtt.client.id=Spring-Boot-Backend-Marwane
# Le "+" permet d'écouter toutes les stations (ST-CASABLANCA, ST-RABAT, etc.)
mqtt.topic=emsi/pfa/marwane_mouad/weather/+/data

# --- Base de données H2 (En mémoire) ---
spring.datasource.url=jdbc:h2:mem:meteo_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Demander à Spring Boot de créer les tables automatiquement d'après tes classes Java
spring.jpa.hibernate.ddl-auto=update

# Activer l'interface web pour voir nos données !
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console